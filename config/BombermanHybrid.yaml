behaviors:
  BombermanHybrid:
    trainer_type: ppo
    
    hyperparameters:
      learning_rate: 3.0e-4
      batch_size: 1024
      buffer_size: 10240
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3

    network_settings:
      hidden_units: 128
      num_layers: 2
      normalize: true

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
        
    summary_freq: 5000
    max_steps: 300000

